name: Nightly Publish CI
'on':
  schedule:
  - cron: 0 5 * * *
  workflow_dispatch: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  nightly-publish:
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'cidsod7z' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup JDKs
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21

          '
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
    - name: Setup gradle properties
      run: '.github/scripts/gradle-properties.sh 21 >> gradle.properties

        cat gradle.properties

        '
    - name: Publish to Central Portal snapshots repository
      run: ./gradlew publishToMavenCentral
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME
          }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD
          }}
        ORG_GRADLE_PROJECT_signingKey: ${{ secrets.CI_AT_DEEPHAVEN_KEY }}
        ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.CI_AT_DEEPHAVEN_PASSWORD }}
        ORG_GRADLE_PROJECT_signingRequired: true
    - name: Slack Nightly Failure
      uses: slackapi/slack-github-action@v2.1.0
      id: slack-nightly-failure
      if: failure()
      with:
        webhook-type: webhook-trigger
        payload: "{\n  \"slack_message\": \"Nightly publish failure @ ${{ github.head_ref\
          \ }} ${{ github.sha }} ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{\
          \ github.run_id }}\"\n}\n"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_NIGHTLY_FAILURE }}
